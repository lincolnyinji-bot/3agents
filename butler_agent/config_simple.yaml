# 🎯 管家Agent校准版配置 v1.2
agent:
  name: "管家Agent_calibrated"
  version: "1.2.0"
  integrated_with: "小蜜蜂Agent_v1.3_calibrated"
  calibration_accuracy: 0.875

# Agent集成
agent_integration:
  scout_agent:
    enabled: true
    config_version: "1.3.0"
    key_features:
      - "生物+商科组合直接否决"
      - "核工程属于STEM核心"
      - "阈值优化：苛刻0.65，宽松0.55"
      - "长期工作经验特别加分"
      - "顶级学校特别加分"
    search_schedule:
      strict_screening: "09:00"
      loose_screening: "20:00"

# 工作流
workflow:
  state_machine:
    states:
      discovered: "发现"
      strict_screened: "严格初筛"
      loose_screened: "宽松初筛"
      judged: "裁判评估"
      recommended: "推荐"
      rejected: "拒绝"
      talent_pool: "人才储备"
      hired: "录用"
  
  scheduling:
    strict_screening:
      enabled: true
      cron_expression: "0 9 * * *"
      max_results: 50
    loose_screening:
      enabled: true
      cron_expression: "0 20 * * *"
      max_results: 100
    daily_report:
      enabled: true
      cron_expression: "0 22 * * *"

# 报告
reporting:
  daily_report:
    summary:
      enabled: true
      items:
        - "各JD候选人数统计"
        - "通过/拒绝比例分析"
        - "主要拒绝原因统计"
        - "人才储备库更新"
    insights:
      enabled: true
      items:
        - "教育背景分布分析"
        - "工作经验模式分析"
        - "搜索关键词效果评估"
        - "规则准确率统计"
    recommendations:
      enabled: true
      items:
        - "规则优化建议"
        - "搜索策略调整建议"
        - "人才储备推荐"

# 错误处理
error_handling:
  network_errors:
    retry_count: 3
    retry_delay: 5
  data_consistency:
    enabled: true
  monitoring:
    enabled: true
    alerts:
      - "连续3次搜索失败"
      - "规则准确率低于80%"

# 校准
calibration:
  inherited_from_scout:
    accuracy: 0.875
    key_optimizations:
      - "生物+商科组合直接否决"
      - "核工程属于STEM核心"
      - "通过阈值优化"
      - "长期工作经验特别加分"
      - "顶级学校特别加分"
  continuous_calibration:
    enabled: true
    accuracy_target: 0.85

# 部署
deployment:
  current_phase: "Phase 2 - 集成小蜜蜂Agent校准版"
  status: "进行中"
  next_steps:
    - "验证小蜜蜂Agent集成效果"
    - "测试完整工作流"
    - "配置裁判Agent连接"
    - "准备生产环境部署"