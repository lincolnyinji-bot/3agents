# 📝 配置说明

## 核心改进点：

### 1. **学历信息不全处理**
- 硕士/博士学历优秀 → 假设本科也符合
- 不是"补偿"，而是"合理假设"
- 符合猎头实操逻辑

### 2. **专业分类体系**
- 基于用户确认的专业分类
- STEM核心 vs STEM相关 vs 边缘理工科
- 专业相关性 > 单纯的学校排名

### 3. **工作经验价值**
- 长期连续工作特别加分（不是学历补偿）
- 5年以上连续工作：强烈稳定性证明
- 2年内频繁跳槽：减分

### 4. **特殊规则处理**
- 只增加必要的特殊规则
- 避免过度复杂化
- 保持核心规则简单清晰

## 预期效果：
- **准确率提升**：从75%提升到85%+
- **决策更符合实操**：基于用户真实决策逻辑
- **系统更健壮**：处理好各种特殊情况

## 使用说明：
1. 将本配置重命名为 `config.yaml`
2. 运行 `python test_final_calibration.py`
3. 验证准确率达到85%+
4. 集成到小蜜蜂Agent