agent:
  name: "小蜜蜂Agent_v1.3_calibrated"
  version: "1.3.0"
  calibration_accuracy: 0.875
  calibration_samples: 8
  calibration_date: "2026-03-07"
  calibrated_by: "王桢"

## 🚫 决定性否决规则

decisive_reject_rules:
  # 规则1：生物+商科组合直接否决
  bio_business_combo:
    enabled: true
    condition: "first_degree.major contains '生物' and second_degree.major contains '商'"
    action: "reject"
    score: 0.0
    reason: "生物+商科组合完全不匹配AI投资，直接否决"
    
  # 规则2：苛刻客户第一学历商科否决
  strict_business_first_degree:
    enabled: true
    condition: "client_type == 'strict' and first_degree.type == '商科'"
    action: "reject"
    score: 0.0
    reason: "苛刻客户要求第一学历理工科，但第一学历是商科"

