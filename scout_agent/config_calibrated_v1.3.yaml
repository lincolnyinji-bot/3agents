## 🎯 决策阈值（基于校准优化）

decision_thresholds:
  
  # 苛刻客户阈值（松禾资本、千乘资本）
  strict_client:
    pass_threshold: 0.65  # ✅ 从0.70优化到0.65
    reject_threshold: 0.40
    review_threshold: 0.50
    
    # 子维度最低要求
    education_min: 0.30
    experience_min: 0.25
    relevance_min: 0.10
  
  # 宽松客户阈值（明荟致远）
  loose_client:
    pass_threshold: 0.55  # ✅ 从0.60优化到0.55
    reject_threshold: 0.30
    review_threshold: 0.40
    
    # 子维度最低要求（更宽松）
    education_min: 0.20
    experience_min: 0.30
    relevance_min: 0.05

## 📈 特别加分规则

special_bonus_rules:
  
  # 长期连续工作经验特别加分
  long_term_experience_bonus:
    enabled: true
    condition: "experience.duration_years >= 5"
    bonus: 0.15
    reason: "5年以上连续工作经验特别稳定"
    
  # 顶级学校特别加分
  top_school_bonus:
    enabled: true
    condition: "school in ['MIT', '麻省理工学院', '斯坦福', '哈佛', '剑桥', '牛津', '加州伯克利']"
    bonus: 0.10
    reason: "世界顶级学校适当加分"
    
  # AI技能标签加分
  ai_skills_bonus:
    enabled: true
    condition: "tags contains ['机器学习', 'python', 'AI', '人工智能']"
    bonus: 0.10
    reason: "具有AI技术技能，懂技术会实操"

