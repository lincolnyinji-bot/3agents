## 🎯 搜索策略优化

search_strategy:
  
  # 关键词生成
  keyword_generation:
    main_patterns:
      - "${field}+投资"
      - "${field}投资经理"
      - "${field}投资总监"
    
    # 专业相关关键词扩展
    stem_core_keywords:
      "人工智能": ["AI", "机器学习", "深度学习", "大模型", "生成式AI"]
      "硬科技": ["芯片", "半导体", "机器人", "新能源", "生物医药"]
    
    # 城市匹配策略
    city_matching:
      priority: "current_city_in_expected_and_target"
      fallback: "expected_city_in_target"
      last_resort: "consider_if_scarce"
  
  # 筛选条件
  filtering:
    # 严格快筛（早上9点）
    strict_screening:
      time: "09:00"
      max_results: 50
      filters:
        education_min: 0.4
        experience_min: 0.3
        relevance_min: 0.1
    
    # 宽松快筛（晚上8点）
    loose_screening:
      time: "20:00"
      max_results: 100
      filters:
        education_min: 0.2
        experience_min: 0.2
        relevance_min: 0.05

