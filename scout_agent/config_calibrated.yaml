# 🐝 小蜜蜂Agent校准后配置
# 基于2026-03-07用户标注数据优化

## 🎯 基础配置
agent:
  name: "小蜜蜂Agent_v1.1"
  version: "1.1.0"
  platform: "liepin"
  calibration_date: "2026-03-07"
  calibrated_by: "王桢"
  samples_count: 16  # 标注样本数
  
## 🔍 搜索策略配置（基于用户实操）
search_strategy:
  # 关键词生成策略
  keyword_generation:
    # 主关键词：大方向+投资
    main_pattern: "${field}+投资"
    
    # 细分关键词：细分领域+投资
    sub_patterns:
      - "${sub_field}+投资"
      - "${field} ${position}"
    
    # 示例关键词库（基于用户实操）
    ai_keywords: 
      - "人工智能+投资"
      - "AI+投资"
      - "agent+投资"
      - "具身智能+投资"
    aerospace_keywords:
      - "商业航天+投资"
      - "低空经济+投资"
      - "卫星+投资"
      - "火箭+投资"
    quantum_keywords:
      - "量子计算+投资"
      - "量子+投资"
    manufacturing_keywords:
      - "先进制造+投资"
      - "高端制造+投资"
    material_keywords:
      - "新材料+投资"
    
  # 城市匹配策略
  city_matching:
    priority: "current_city_in_expected_and_target"  # 目前城市在期望城市和目标城市中
    fallback: "expected_city_in_target"             # 期望城市在目标城市中
    last_resort: "consider_if_scarce"              # 候选人稀缺时才放宽
    
  # 筛选条件配置
  filters:
    # 苛刻客户（松禾资本/千乘资本）
    strict_client:
      work_experience:
        - "5-10年"
        - "3-5年"
      education:
        - "硕士"
        - "博士/博士后"
      schools:
        - "985"
        - "海外留学"
      current_city:
        - "深圳"
        - "北京"
        - "杭州"
        - "上海"
        - "苏州"
      expected_city:
        - "深圳"
        - "北京"
        - "杭州"
        - "上海"
        - "苏州"
      
    # 宽松客户（明荟致远）
    loose_client:
      work_experience:
        - "5-10年"
      education:
        - "本科"
        - "硕士"
        - "博士/博士后"
      schools:
        - "211"
        - "985"
        - "双一流"
        - "海外留学"
      current_city:
        - "深圳"
      expected_city:
        - "深圳"

## 🎯 教育背景权重配置
education_weights:
  # 第一学历权重（基于用户校正）
  first_degree:
    priority_1:  # 优先级1（强烈加分）
      - "985理工科"
      - "QS100理工科"
      weight: 1.0
      
    priority_2:  # 优先级2（可接受）
      - "211理工科"
      - "双一流理工科"
      - "重点本科理工科"
      weight: 0.7
      
    priority_3:  # 优先级3（考虑中）
      - "其他本科理工科"
      weight: 0.4
      
    reject:  # 直接拒绝
      - "商科本科（苛刻客户）"
      weight: 0.0
      
  # 第二学历权重（基于用户校正：海外名校=985 > 211）
  second_degree:
    priority_1:  # 优先级1（强烈加分）
      - "QS100硕士"
      - "985硕士"
      weight: 1.0
      
    priority_2:  # 优先级2（可接受）
      - "211硕士"
      - "海外名校硕士"
      - "双一流硕士"
      weight: 0.8
      
    priority_3:  # 优先级3（考虑中）
      - "其他硕士"
      weight: 0.5
  
  # 专业复合权重（基于用户校正：理工+商科 = 理工+理工 > 商科+理工）
  degree_combo:
    priority_1:  # 优先级1（强烈加分）
      - "理工本科 + 商科硕士"
      - "理工本科 + 理工硕士"
      weight: 1.0
      
    priority_2:  # 优先级2（可接受）
      - "商科本科 + 理工硕士"
      weight: 0.7
      
    priority_3:  # 优先级3（考虑中）
      - "理工本科 + 其他硕士"
      - "商科本科 + 商科硕士"
      weight: 0.3

## ⚡ 工作经验权重配置
experience_weights:
  # 投资经验连续性（基于用户校正）
  investment_continuity:
    priority_1:  # 优先级1（强烈加分）
      description: "在同一投资机构连续工作3年以上"
      weight: 1.0
      example: "韩**（麻省理工）：国资投资平台·投资总监2022.04-至今(3年11个月)"
      
    priority_2:  # 优先级2（加分）
      description: "累计投资经验4年以上"
      weight: 0.8
      example: "陈先生（南洋理工）：招商局资本·投资经理2021.04-至今(4年11个月)"
      
    priority_3:  # 优先级3（可接受）
      description: "投资相关岗位2年以上"
      weight: 0.6
      
    negative:  # 负面因素（减分）
      description: "频繁跳槽（2年内换工作）"
      weight: -0.5
      example: "耿**：上海交通大学无锡光子芯片研究院·投资孵化高级经理2024.09-2025.11(1年2个月)"
  
  # 产业经验权重（基于用户校正：与需求岗位一致的产业投资经验≥投资机构经验 > 非相关产业投资经验> 相关岗位经验）
  industry_experience:
    priority_1:  # 优先级1（强烈加分）
      description: "与需求岗位一致的产业投资经验"
      weight: 1.0
      example: "AI方向候选人有AI领域投资案例"
      
    priority_2:  # 优先级2（加分）
      description: "投资机构经验"
      weight: 0.9
      example: "许**：力合创投·投资经理2023.11-至今(2年4个月)"
      
    priority_3:  # 优先级3（可接受）
      description: "非相关产业投资经验"
      weight: 0.6
      
    priority_4:  # 优先级4（考虑中）
      description: "相关岗位经验"
      weight: 0.4
  
  # 领域相关性权重
  field_relevance:
    # AI领域相关性
    ai_relevance:
      - "有机器学习/AI相关标签"
      - "有Python等编程技能"
      - "教育背景与技术相关"
      weight: 0.3
      
    # 硬科技领域相关性
    hardtech_relevance:
      - "理工科教育背景"
      - "技术研发经验"
      - "技术项目管理经验"
      weight: 0.3

## 🎯 初筛决策规则
screening_rules:
  # 苛刻客户决策树
  strict_client_decision:
    # 第一关：硬性拒绝条件
    hard_reject:
      - name: "第一学历不符合"
        condition: "education.first_degree in ['商科本科']"
        action: "reject"
        reason: "第一学历商科，不符合理工科要求"
        
      - name: "本硕都是商科"
        condition: "education.first_degree in ['商科'] and education.second_degree in ['商科']"
        action: "reject"
        reason: "本硕都是商科，不符合技术背景要求"
        
      - name: "非投资岗位"
        condition: "current_position in ['董秘', '投资者关系', '融资经理', '业务经理']"
        action: "reject"
        reason: "岗位与投资核心职能不匹配"
        
      - name: "频繁跳槽"
        condition: "job_changes_in_2_years >= 2"
        action: "reject"
        reason: "工作稳定性差，频繁跳槽"
    
    # 第二关：计分通过
    scoring_pass:
      total_threshold: 0.7  # 总分阈值
      education_weight: 0.4  # 教育背景权重
      experience_weight: 0.5  # 工作经验权重
      relevance_weight: 0.1  # 相关性权重
      
      # 各维度打分标准
      education_scores:
        first_degree:
          "985理工科": 1.0
          "QS100理工科": 1.0
          "211理工科": 0.7
          "双一流理工科": 0.7
          "其他理工科": 0.4
          
        second_degree:
          "QS100硕士": 1.0
          "985硕士": 1.0
          "211硕士": 0.8
          "海外名校硕士": 0.8
          "其他硕士": 0.5
          
      experience_scores:
        investment_continuity:
          "连续工作3年以上": 1.0
          "累计投资4年以上": 0.8
          "投资相关2年以上": 0.6
          
        industry_match:
          "完全匹配": 1.0
          "投资机构经验": 0.9
          "非相关产业投资": 0.6
          "相关岗位经验": 0.4
  
  # 宽松客户决策树
  loose_client_decision:
    # 第一关：硬性拒绝条件
    hard_reject:
      - name: "年龄超过限制"
        condition: "age > 35"
        action: "reject"
        reason: "超过年龄限制（35岁）"
        
      - name: "经验完全不相关"
        condition: "experience.relevance_score < 0.2"
        action: "reject"
        reason: "工作经验与岗位完全不相关"
    
    # 第二关：计分通过
    scoring_pass:
      total_threshold: 0.6  # 较低阈值
      education_weight: 0.3  # 教育权重较低
      experience_weight: 0.6  # 经验权重较高
      relevance_weight: 0.1
      
    # 人才储备逻辑
    talent_pool_logic:
      enabled: true
      conditions:
        - name: "优秀学术背景但经验不足"
          condition: "education.score >= 0.8 and experience.score < 0.5"
          action: "talent_pool"
          pool_name: "学术潜力人才"
          
        - name: "领域相关研究经验"
          condition: "has_research_experience = true and education.score >= 0.7"
          action: "talent_pool"
          pool_name: "研究型人才"
          
        - name: "专业匹配但岗位不匹配"
          condition: "education.major_match >= 0.8 and experience.position_match < 0.4"
          action: "talent_pool"
          pool_name: "专业匹配人才"

## 📊 阈值配置
thresholds:
  # 通过/拒绝阈值
  strict_client:
    pass_threshold: 0.7  # 总分≥0.7通过
    reject_threshold: 0.4  # 总分<0.4拒绝
    review_threshold: 0.5  # 0.5-0.7需要人工审核
    
  loose_client:
    pass_threshold: 0.6
    reject_threshold: 0.3
    review_threshold: 0.4
    
  # 人才储备阈值
  talent_pool:
    academic_potential: 0.8  # 教育分数
    research_potential: 0.7  # 研究经验分数
    major_match: 0.8         # 专业匹配分数

## 🧠 记忆去重配置
memory_deduplication:
  enabled: true
  dedup_fields: ["name", "education.school", "work_experience.company"]
  dedup_window_days: 30
  
  # 特殊处理：优秀人才跨需求复用
  talent_reuse:
    enabled: true
    conditions:
      - "scoring.total >= 0.8"  # 高分候选人
      - "education.score >= 0.9"  # 优秀教育背景
      - "experience.score >= 0.8"  # 优秀工作经验
    reuse_count: 3  # 最多复用3次

## ⏰ 定时任务优化
schedule_optimized:
  # 严格快筛：早上9点（质量优先）
  strict_screening:
    time: "09:00"
    client_types: ["strict"]
    search_strategy: "quality_first"
    max_results: 50  # 数量限制，保证质量
    
  # 宽松快筛：晚上8点（覆盖优先）
  loose_screening:
    time: "20:00"
    client_types: ["loose", "strict"]  # 宽松客户 + 苛刻客户补充
    search_strategy: "coverage_first"
    max_results: 100  # 数量放宽
    
  # 人才储备扫描：中午12点
  talent_pool_scan:
    time: "12:00"
    enabled: true
    scan_talent_pools: true

## 📈 报告优化
reporting_optimized:
  # 日报内容
  daily_report:
    summary:
      - "各JD候选人数统计"
      - "通过/拒绝比例分析"
      - "主要拒绝原因统计"
      - "人才储备库更新"
      
    insights:
      - "教育背景分布分析"
      - "工作经验模式分析"
      - "搜索关键词效果评估"
      - "规则准确率统计"
      
    recommendations:
      - "规则优化建议"
      - "搜索策略调整建议"
      - "人才储备推荐"
      
  # 校准反馈循环
  calibration_feedback:
    enabled: true
    collect_user_feedback: true
    update_rules_frequency: "weekly"
    accuracy_target: 0.85  # 准确率目标85%

## 🧪 测试配置
testing:
  # 基于标注数据的测试
  calibration_tests:
    samples: 16  # 用户标注的16个样本
    expected_accuracy: 0.85  # 期望准确率
    
    test_cases:
      - name: "陈先生-通过测试"
        candidate_id: "chen_xiansheng"
        expected_result: "pass"
        expected_score: ">=0.7"
        
      - name: "韩**-通过测试"
        candidate_id: "han_xx"
        expected_result: "pass"
        expected_score: ">=0.8"
        
      - name: "王**-拒绝测试"
        candidate_id: "wang_xx"
        expected_result: "reject"
        expected_reason: "第一学历不符，非投资岗位"
        
      - name: "黄**-拒绝测试"
        candidate_id: "huang_xx"
        expected_result: "reject"
        expected_reason: "本硕学历一般，经验不足"
  
  # A/B测试配置
  ab_testing:
    enabled: true
    test_groups:
      - name: "原规则组"
        config: "config.yaml"
        sample_size: 30
        
      - name: "校准规则组"
        config: "config_calibrated.yaml"
        sample_size: 30

## 🚀 下一步计划
next_steps:
  immediate:
    - "基于校准配置运行测试"
    - "验证16个样本的准确性"
    - "生成校准效果报告"
    
  short_term:
    - "集成到小蜜蜂Agent"
    - "更新管家Agent配置"
    - "进行A/B测试验证"
    
  long_term:
    - "持续收集用户反馈"
    - "每月更新规则权重"
    - "扩展到更多客户类型和领域"

