# 📝 配置说明

## 关键改进点：
1. **教育权重细化**：基于用户标注的学历优先级
2. **经验连续性价值**：强调了在同一机构工作的加分
3. **产业经验权重**：明确了不同经验类型的优先级
4. **人才储备逻辑**：增加了优秀但经验不足人才的识别
5. **阈值优化**：基于真实数据调整通过/拒绝阈值

## 预期效果：
- **准确率提升**：从估计~60%提升到目标~85%
- **搜索覆盖率**：多级关键词策略覆盖更多候选人
- **决策一致性**：基于权重的计分系统减少主观偏差

## 使用说明：
1. 将本配置重命名为 `config.yaml` 覆盖原配置
2. 运行 `python test_calibration.py` 验证准确性
3. 集成到小蜜蜂Agent进行真实测试