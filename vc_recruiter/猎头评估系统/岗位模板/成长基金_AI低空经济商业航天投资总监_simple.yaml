岗位名称: 成长基金_高级投资经理_投资总监
领域专注: 人工智能/低空经济/商业航天
客户类型: 成长基金

# 硬性要求
硬性要求:
  学历要求: "985/211/海内外知名院校，硕士及以上学历，人工智能、电子信息工程、机械自动化等理工科背景"
  经验要求: "5年以上硬科技产业及投资领域工作经验，3年以上PE/VC投资经验"
  领域要求: "在人工智能/低空经济/商业航天等领域有丰富经验"

# 评估权重
评估权重:
  学历背景: 0.25
  技术理解: 0.30
  投资经验: 0.35
  领域匹配: 0.10

# 否决标准
否决标准:
  - "缺少硕士学历"
  - "非理工科背景"
  - "工作经验不足5年"
  - "PE/VC经验不足3年"

# 级别标准
级别标准:
  投资总监: "7-10年经验，主导多个完整投资项目，有团队管理经验"
  高级投资经理: "5-7年经验，参与多个项目，可能主导部分"
  投资经理: "3-5年经验，参与项目执行"

# 薪资范围
薪资范围:
  投资总监: "150-300万+"
  高级投资经理: "80-150万"
  投资经理: "50-100万"