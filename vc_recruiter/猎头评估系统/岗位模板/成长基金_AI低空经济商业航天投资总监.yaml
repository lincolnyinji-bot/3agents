# 🎯 岗位评估模板：成长基金高级投资经理/投资总监
# 领域：人工智能/低空经济/商业航天
# 创建时间：2026-03-07
# 基于真实客户需求

岗位名称: 成长基金_高级投资经理_投资总监
领域专注: 人工智能/低空经济/商业航天
客户类型: 成长基金（相对宽容但有硬性要求）
创建人: 系统自动生成

# 📋 岗位要求（来自客户需求）

## **硬性要求（必备条件）**
学历要求:
  - 985/211/海内外知名院校
  - 硕士及以上学历
  - 人工智能、电子信息工程、机械自动化等理工科背景

经验要求:
  - 5年以上硬科技产业及投资领域工作经验
  - 3年以上PE/VC投资经验
  - 在人工智能/低空经济/商业航天等领域有丰富经验

### **软性要求**
- 性格开朗、为人真诚、自驱力强
- 优秀沟通能力、执行能力、团队协作能力
- 能承受一定的工作压力

### **工作地点**
- 深圳、北京、杭州

## 📊 评估权重设置

### **核心能力权重**
学历背景: 0.25          # 硕士+理工科是必备条件
技术理解: 0.30          # 硬科技领域理解深度
投资经验: 0.35          # 3+年PE/VC投资经验
领域匹配: 0.10          # AI/低空经济/商业航天经验

### **加分项权重**
创业经验: +0.05         # 有创业或联合创业经验
行业资源: +0.05         # 产业资源丰富
证书资质: +0.03         # 相关专业证书
语言能力: +0.02         # 英语流利（海外背景）

## 🎯 评估标准

### **学历评估**
#### ✅ 通过标准：
- 硕士学历（必须）
- 理工科专业（必须）
- 985/211/海外名校（优先）

#### ❌ 否决标准：
- 本科学历（不符合硕士要求）
- 非理工科背景（不符合硬性要求）
- 非正规院校（需具体评估）

### **经验评估**
#### ✅ 通过标准：
- 5年以上工作经验（必须）
- 3年以上PE/VC投资经验（必须）
- 硬科技产业背景（必须）

#### ⚠️ 风险标准：
- 经验刚满5年（需考察项目质量）
- PE/VC经验不足3年（需考察转换背景）
- 产业经验非硬科技领域（需具体评估）

### **领域匹配评估**
#### 优先领域（按优先级）：
1. 人工智能（AI算法、芯片、应用）
2. 低空经济（无人机、eVTOL、空管系统）
3. 商业航天（火箭、卫星、空间技术）

#### 相关领域（可接受）：
- 半导体、先进制造、机器人
- 新能源、新材料、生物科技
- 其他硬科技领域

## 📈 级别判断标准

### **投资总监级别（总监级）**
- 经验：7-10年
- 投资案例：主导多个完整投资项目
- 管理经验：有团队管理或项目lead经验
- 薪资范围：150-300万+

### **高级投资经理级别（经理级）**
- 经验：5-7年
- 投资案例：参与多个项目，可能主导部分
- 管理经验：可能没有正式团队管理
- 薪资范围：80-150万

### **不符合级别**
- 经验不足5年
- 缺乏PE/VC投资经验
- 专业背景不匹配

## 🔍 关键信息提取点

### **简历中必须识别的内容**
1. 教育背景（学校、专业、学历）
2. 工作年限（总工作经验）
3. PE/VC经验年限
4. 投资案例数量和质量
5. 领域匹配度（AI/低空/航天）
6. 当前职位和级别

### **自动提取规则**
- 学校识别：985/211/海外名校名单匹配
- 专业识别：理工科关键词匹配
- 经验计算：工作年限累加
- 案例识别：投资案例关键词提取

## 📝 评估报告模板

### **通过候选人报告**
```
# 候选人评估报告

## 基本信息
- 姓名：XXX
- 年龄：XX岁
- 当前职位：XXX

## 关键匹配点
✅ 学历符合：XX大学硕士，理工科背景
✅ 经验符合：X年工作经验，其中X年PE/VC投资经验
✅ 领域匹配：在AI/低空经济/商业航天有X年经验
✅ 级别匹配：符合高级投资经理/投资总监级别

## 推荐建议
- 推荐级别：高级投资经理 / 投资总监
- 目标薪资：XXX-XXX万
- 匹配分数：XX/100
- 推荐理由：XXX
```

### **不通过候选人报告**
```
# 候选人评估报告

## 否决原因
❌ 学历不符合：缺少硕士学历 / 非理工科背景
❌ 经验不符合：缺少X年PE/VC经验
❌ 领域不匹配：无AI/低空/航天相关经验

## 建议
- 不符合此岗位硬性要求
- 可考虑其他相关岗位
```

## 🔄 系统配置

### **OCR识别配置**
- 语言：chi_sim+eng（中英文）
- PSM模式：6（统一文本块）
- 图像增强：开启（对比度+亮度+锐化）

### **信息提取配置**
- 学校库：985/211/海外名校名单
- 专业库：理工科专业关键词
- 公司库：知名投资机构名单
- 职位库：投资相关职位关键词

### **评估算法配置**
- 评分算法：加权求和
- 阈值设置：通过≥70分，推荐≥85分
- 自动分级：基于经验年限和案例数量

## 💾 持久化设置

### **模板存储**
- 路径：/root/.openclaw/workspace/vc_recruiter/猎头评估系统/岗位模板/
- 格式：YAML（易于修改和扩展）
- 版本：v1.0（基于真实客户需求）

### **案例学习**
- 每个评估案例都会记录
- 用于优化模板准确性
- 建立评估基准库

